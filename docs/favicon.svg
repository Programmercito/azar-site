<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c842" />
      <stop offset="60%" stop-color="#d4a843" />
      <stop offset="100%" stop-color="#e8732a" />
    </linearGradient>
  </defs>
  
  <!-- Fondo de la app -->
  <rect width="100" height="100" rx="22" fill="#080810" />
  
  <g transform="translate(0, 3)">
    <!-- La letra "A" minimalista que también forma una flecha/cursor -->
    <path d="M24 75 L50 22 L76 75" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- El "Punto de Entropía" que hace de barra transversal de la A -->
    <circle cx="50" cy="58" r="8" fill="#f5c842" />
    
    <!-- Un par de partículas pequeñas simulando aleatoriedad/caos -->
    <circle cx="50" cy="40" r="2.5" fill="#f5c842" opacity="0.8" />
    <circle cx="38" cy="66" r="1.5" fill="#e8732a" opacity="0.6" />
    <circle cx="62" cy="66" r="1.5" fill="#e8732a" opacity="0.6" />
  </g>
</svg>
